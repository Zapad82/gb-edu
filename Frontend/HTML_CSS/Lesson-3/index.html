    <!-- 1. Что такое css?
    Это каскадная таблица стилей. Формальный язык описания внешнего вида документа, написанного с использованием языка
    разметки.
    Преимущественно используется как средство описания, оформления внешнего вида веб-страниц.

    2. Синтаксис css?
    Селектор {
    свойство1:значение1;
    свойство2:значение;
    }
    Пример:
    p {
    color:blue;
    }

    3. Оформление стилей
    Селектор {
    свойство1:значение1;
    свойство2:значение;
    }
    Самый рациональный способ оформления, когда Селектор открывает свойства на одной строке, все остальное ниже
    строками.

    4. Комментарии
    /*Внешний вид*/- однострочный комментарий
    p {
    color: blue;
    }
